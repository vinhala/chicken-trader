name: Sync Environment File

on:
  workflow_call:
    secrets:
      VM_HOST:
        required: true
      VM_USER_NAME:
        required: true
      VM_SSH_KEY:
        required: true
      SECRET_KEY:
        required: true
      POSTGRES_USER:
        required: false
      POSTGRES_PASSWORD:
        required: true
      POSTGRES_DB:
        required: false
      POSTGRES_HOST:
        required: false
      POSTGRES_PORT:
        required: false
      REDIS_HOST:
        required: false
      REDIS_PORT:
        required: false
      REDIS_DB:
        required: false
      NEWS_API_KEY:
        required: true
      NEWS_API_BASE_URL:
        required: false
      MARKET_API_KEY:
        required: true
      MARKET_API_BASE_URL:
        required: false
      OPENAI_API_KEY:
        required: true
      SMTP_HOST:
        required: false
      SMTP_PORT:
        required: false
      SMTP_USER:
        required: false
      SMTP_PASSWORD:
        required: false
      SMTP_FROM:
        required: false

jobs:
  sync-env:
    runs-on: ubuntu-latest
    steps:
      - name: Write .env file
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
          POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}
          REDIS_HOST: ${{ secrets.REDIS_HOST }}
          REDIS_PORT: ${{ secrets.REDIS_PORT }}
          REDIS_DB: ${{ secrets.REDIS_DB }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          NEWS_API_BASE_URL: ${{ secrets.NEWS_API_BASE_URL }}
          MARKET_API_KEY: ${{ secrets.MARKET_API_KEY }}
          MARKET_API_BASE_URL: ${{ secrets.MARKET_API_BASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
        run: |
          cat > "$RUNNER_TEMP/.env" <<EOF
          SECRET_KEY=${SECRET_KEY}
          ACCESS_TOKEN_EXPIRE_MINUTES=1440
          POSTGRES_USER=${POSTGRES_USER:-app}
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          POSTGRES_DB=${POSTGRES_DB:-investment_app}
          POSTGRES_HOST=${POSTGRES_HOST:-postgres}
          POSTGRES_PORT=${POSTGRES_PORT:-5432}
          REDIS_HOST=${REDIS_HOST:-redis}
          REDIS_PORT=${REDIS_PORT:-6379}
          REDIS_DB=${REDIS_DB:-0}
          NEWS_API_KEY=${NEWS_API_KEY}
          NEWS_API_BASE_URL=${NEWS_API_BASE_URL:-https://newsapi.org/v2}
          MARKET_API_KEY=${MARKET_API_KEY}
          MARKET_API_BASE_URL=${MARKET_API_BASE_URL:-https://finnhub.io/api/v1}
          OPENAI_API_KEY=${OPENAI_API_KEY}
          SMTP_HOST=${SMTP_HOST}
          SMTP_PORT=${SMTP_PORT:-587}
          SMTP_USER=${SMTP_USER}
          SMTP_PASSWORD=${SMTP_PASSWORD}
          SMTP_FROM=${SMTP_FROM:-no-reply@example.com}
          EOF

      - name: Copy .env to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER_NAME }}
          key: ${{ secrets.VM_SSH_KEY }}
          source: "${{ runner.temp }}/.env"
          target: "/home/${{ secrets.VM_USER_NAME }}"
          strip_components: 3
