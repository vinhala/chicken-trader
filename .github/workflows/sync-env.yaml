name: Sync Environment File

on:
  workflow_call:
    secrets:
      VM_HOST:
        required: true
      VM_USER_NAME:
        required: true
      VM_SSH_KEY:
        required: true
      SECRET_KEY:
        required: true
      POSTGRES_USER:
        required: false
      POSTGRES_PASSWORD:
        required: true
      POSTGRES_DB:
        required: false
      POSTGRES_HOST:
        required: false
      POSTGRES_PORT:
        required: false
      REDIS_HOST:
        required: false
      REDIS_PORT:
        required: false
      REDIS_DB:
        required: false
      NEWS_API_KEY:
        required: true
      NEWS_API_BASE_URL:
        required: false
      MARKET_API_KEY:
        required: true
      MARKET_API_BASE_URL:
        required: false
      OPENAI_API_KEY:
        required: true
      SMTP_HOST:
        required: false
      SMTP_PORT:
        required: false
      SMTP_USER:
        required: false
      SMTP_PASSWORD:
        required: false
      SMTP_FROM:
        required: false

jobs:
  sync-env:
    runs-on: ubuntu-latest
    steps:
      - name: Write .env file on VM
        uses: appleboy/ssh-action@v1.0.3
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
          POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}
          REDIS_HOST: ${{ secrets.REDIS_HOST }}
          REDIS_PORT: ${{ secrets.REDIS_PORT }}
          REDIS_DB: ${{ secrets.REDIS_DB }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          NEWS_API_BASE_URL: ${{ secrets.NEWS_API_BASE_URL }}
          MARKET_API_KEY: ${{ secrets.MARKET_API_KEY }}
          MARKET_API_BASE_URL: ${{ secrets.MARKET_API_BASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER_NAME }}
          key: ${{ secrets.VM_SSH_KEY }}
          envs: SECRET_KEY,POSTGRES_USER,POSTGRES_PASSWORD,POSTGRES_DB,POSTGRES_HOST,POSTGRES_PORT,REDIS_HOST,REDIS_PORT,REDIS_DB,NEWS_API_KEY,NEWS_API_BASE_URL,MARKET_API_KEY,MARKET_API_BASE_URL,OPENAI_API_KEY,SMTP_HOST,SMTP_PORT,SMTP_USER,SMTP_PASSWORD,SMTP_FROM
          script: |
            {
              printf 'SECRET_KEY=%s\n' "${SECRET_KEY}"
              printf 'ACCESS_TOKEN_EXPIRE_MINUTES=1440\n'
              printf 'POSTGRES_USER=%s\n' "${POSTGRES_USER:-app}"
              printf 'POSTGRES_PASSWORD=%s\n' "${POSTGRES_PASSWORD}"
              printf 'POSTGRES_DB=%s\n' "${POSTGRES_DB:-investment_app}"
              printf 'POSTGRES_HOST=%s\n' "${POSTGRES_HOST:-postgres}"
              printf 'POSTGRES_PORT=%s\n' "${POSTGRES_PORT:-5432}"
              printf 'REDIS_HOST=%s\n' "${REDIS_HOST:-redis}"
              printf 'REDIS_PORT=%s\n' "${REDIS_PORT:-6379}"
              printf 'REDIS_DB=%s\n' "${REDIS_DB:-0}"
              printf 'NEWS_API_KEY=%s\n' "${NEWS_API_KEY}"
              printf 'NEWS_API_BASE_URL=%s\n' "${NEWS_API_BASE_URL:-https://newsapi.org/v2}"
              printf 'MARKET_API_KEY=%s\n' "${MARKET_API_KEY}"
              printf 'MARKET_API_BASE_URL=%s\n' "${MARKET_API_BASE_URL:-https://finnhub.io/api/v1}"
              printf 'OPENAI_API_KEY=%s\n' "${OPENAI_API_KEY}"
              printf 'SMTP_HOST=%s\n' "${SMTP_HOST}"
              printf 'SMTP_PORT=%s\n' "${SMTP_PORT:-587}"
              printf 'SMTP_USER=%s\n' "${SMTP_USER}"
              printf 'SMTP_PASSWORD=%s\n' "${SMTP_PASSWORD}"
              printf 'SMTP_FROM=%s\n' "${SMTP_FROM:-no-reply@example.com}"
            } > ~/.env
