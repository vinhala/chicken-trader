services:
  umami-postgres:
    image: postgres:16
    environment:
      - POSTGRES_DB=umami
      - POSTGRES_USER=umami
      - POSTGRES_PASSWORD=${UMAMI_POSTGRES_PASSWORD}
    volumes:
      - umami_pg_data:/var/lib/postgresql/data
    networks:
      - private
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    env_file:
      - ../.env
    environment:
      - DATABASE_TYPE=postgresql
      - DATABASE_URL=postgresql://umami:${UMAMI_POSTGRES_PASSWORD}@umami-postgres:5432/umami
      - APP_SECRET=${UMAMI_APP_SECRET}
      - APP_URL=${UMAMI_BASE_URL}
    networks:
      - caddy-network
      - private
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      update_config:
        order: start-first
    labels:
      caddy.reverse_proxy: "{{upstreams 3000}}"

volumes:
  umami_pg_data:
