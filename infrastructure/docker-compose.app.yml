services:
  frontend:
    image: chicken-trader-frontend:latest
    networks:
      - public
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      update_config:
        order: start-first

  api:
    image: chicken-trader-backend:latest
    env_file:
      - ../.env
    networks:
      - public
      - private
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      update_config:
        order: start-first

  worker:
    image: chicken-trader-backend:latest
    env_file:
      - ../.env
    command: ["celery", "-A", "app.workers.celery_app.celery", "worker", "--loglevel=INFO"]
    networks:
      - private
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  scheduler:
    image: chicken-trader-backend:latest
    env_file:
      - ../.env
    command: ["celery", "-A", "app.workers.celery_app.celery", "beat", "--loglevel=INFO"]
    networks:
      - private
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-investment_app}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - private
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  redis:
    image: redis:7-alpine
    networks:
      - private
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

networks:
  public:
    name: ${STACK_NAME:-chicken-trader}_public
  private:
    name: ${STACK_NAME:-chicken-trader}_private

volumes:
  pg_data:
