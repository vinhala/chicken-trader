services:
  frontend:
    image: ghcr.io/chicken-trader/frontend:latest
    env_file:
      - ../.env
    networks:
      - caddy-network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      update_config:
        order: start-first
    labels:
      caddy.reverse_proxy: "{{upstreams 80}}"

  api:
    image: ghcr.io/chicken-trader/backend:latest
    env_file:
      - ../.env
    networks:
      - caddy-network
      - private
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      update_config:
        order: start-first
    labels:
      caddy.reverse_proxy: "{{upstreams 80}}"

  worker:
    image: ghcr.io/chicken-trader/backend:latest
    env_file:
      - ../.env
    command: ["celery", "-A", "app.workers.celery_app.celery", "worker", "--loglevel=INFO"]
    networks:
      - private
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  scheduler:
    image: ghcr.io/chicken-trader/backend:latest
    env_file:
      - ../.env
    command: ["celery", "-A", "app.workers.celery_app.celery", "beat", "--loglevel=INFO"]
    networks:
      - private
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  postgres:
    image: postgres:16
    env_file:
      - ../.env
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - private
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  redis:
    image: redis:7-alpine
    networks:
      - private
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

volumes:
  pg_data:
